<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rack</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DotGothic16',monospace;background:#f0f0f0;overflow-x:hidden}
input,textarea,button,select{font-family:'DotGothic16',monospace;-webkit-appearance:none;border-radius:0}
#root{min-height:100vh;background:#f0f0f0;background-image:radial-gradient(circle,#d8d8d8 1px,transparent 1px);background-size:16px 16px}
@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
.sys-tabs{position:fixed;left:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:0;z-index:60;border:2px solid #2b4280;box-shadow:3px 3px 0 #c7d2ea}
.sys-tab{padding:10px 10px;font-size:12px;letter-spacing:2px;cursor:pointer;text-align:center;border-bottom:1px solid #c7d2ea;min-width:56px}
.sys-tab:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;
const CL={primary:"#2b4280",dark:"#1a2d5c",mid:"#3b56a0",light:"#5571b8",pale:"#8a9fd4",faint:"#c7d2ea",wash:"#e8edf6",bg:"#f0f0f0",card:"#fafafa",text:"#222",muted:"#999",border:"#ccc",shadow:"#c7d2ea",gold:"#d4a03c",goldLight:"#e0c068",goldDark:"#9a7520"};
const S={
  card:{background:CL.card,border:"2px solid "+CL.primary,boxShadow:"3px 3px 0 "+CL.shadow},
  cardDim:{background:CL.card,border:"2px solid "+CL.border,boxShadow:"2px 2px 0 #e0e0e0"},
  btn:{padding:"6px 14px",border:"2px solid "+CL.primary,background:CL.card,color:CL.primary,fontSize:12,letterSpacing:1,cursor:"pointer",boxShadow:"2px 2px 0 "+CL.border,fontFamily:"inherit"},
  btnDk:{padding:"6px 14px",border:"2px solid "+CL.primary,background:CL.primary,color:CL.wash,fontSize:12,letterSpacing:1,cursor:"pointer",boxShadow:"2px 2px 0 "+CL.pale,fontFamily:"inherit"},
  btnSm:{padding:"4px 10px",border:"2px solid "+CL.primary,background:CL.card,color:CL.primary,fontSize:11,cursor:"pointer",fontFamily:"inherit"},
  input:{width:"100%",padding:"8px 10px",border:"2px solid "+CL.primary,background:CL.card,fontFamily:"inherit",fontSize:14,color:CL.primary,outline:"none",boxSizing:"border-box"},
  label:{fontSize:12,color:CL.muted,letterSpacing:1},
  secTitle:{fontSize:12,letterSpacing:2,color:CL.pale,marginBottom:10,paddingBottom:6,borderBottom:"2px dashed "+CL.faint}
};
const TX={
  en:{overview:"OVERVIEW",tasks:"TASKS",metrics:"METRICS",context:"CONTEXT",learn:"LEARN",ideas:"IDEAS",high:"HIGH",med:"MED",low:"LOW",pending:"PENDING",done:"DONE",noTasks:"no tasks",recentTasks:"RECENT TASKS",progress:"PROGRESS",decisions:"DECISIONS",footer:"RACK · Built with # by Iris & Claude",save:"SAVE",more:"\u25bc more",less:"\u25b2 less",quickAdd:"+ QUICK ADD",newTask:"+ new task...",observers:"OBSERVERS",reviews:"REVIEWS",curated:"CURATED",negative:"NEGATIVE",active:"ACTIVE",convRate:"CONV %",notes:"NOTES",onTrack:"ON TRACK",atRisk:"AT RISK",blocked:"BLOCKED",direction:"DIRECTION",current:"NOW",nextStep:"NEXT",recentLearn:"RECENT LEARNINGS",noLearn:"nothing yet",addLearn:"ADD",source:"source",addIdea:"ADD",ideaPh:"new idea...",noIdeas:"no ideas yet",projects:"PROJECTS",completed:"COMPLETED",processed:"PROCESSED",adopt:"adopt",drop:"drop",ideaLabel:"IDEA",loading:"loading...",connect:"CONNECT",urlPh:"Supabase URL",keyPh:"Anon Key",connectBtn:"CONNECT",connectErr:"connection failed",noData:"no data yet"},
  zh:{overview:"\u603b\u89c8",tasks:"\u4efb\u52a1",metrics:"\u6570\u636e",context:"\u4e0a\u4e0b\u6587",learn:"\u5b66\u4e60",ideas:"\u60f3\u6cd5",high:"\u9ad8",med:"\u4e2d",low:"\u4f4e",pending:"\u5f85\u529e",done:"\u5df2\u5b8c\u6210",noTasks:"\u6ca1\u6709\u4efb\u52a1",recentTasks:"\u8fd1\u671f\u4efb\u52a1",progress:"\u8fdb\u5c55",decisions:"\u5df2\u505a\u51b3\u7b56",footer:"RACK \u00b7 Built with # by Iris & Claude",save:"\u4fdd\u5b58",more:"\u25bc \u66f4\u591a",less:"\u25b2 \u6536\u8d77",quickAdd:"+ QUICK ADD",newTask:"+ \u65b0\u4efb\u52a1...",observers:"\u65b0\u589e\u89c2\u7315\u5458",reviews:"\u7315\u8bc4",curated:"\u7cbe\u9009",negative:"\u5dee\u8bc4",active:"\u6d3b\u8dc3",convRate:"\u8f6c\u5316\u7387 %",notes:"\u5907\u6ce8",onTrack:"\u6b63\u5e38",atRisk:"\u6ce8\u610f",blocked:"\u963b\u585e",direction:"\u65b9\u5411",current:"\u73b0\u5728",nextStep:"\u4e0b\u4e00\u6b65",recentLearn:"\u6700\u8fd1\u5b66\u5230\u7684",noLearn:"\u8fd8\u6ca1\u6709\u8bb0\u5f55",addLearn:"\u6dfb\u52a0",source:"\u6765\u6e90",addIdea:"\u6dfb\u52a0",ideaPh:"\u65b0\u60f3\u6cd5...",noIdeas:"\u8fd8\u6ca1\u6709\u60f3\u6cd5",projects:"\u9879\u76ee",completed:"\u5df2\u5b8c\u6210",processed:"\u5df2\u5904\u7406",adopt:"\u91c7\u7eb3",drop:"\u653e\u5f03",ideaLabel:"\u60f3\u6cd5",loading:"\u52a0\u8f7d\u4e2d...",connect:"\u8fde\u63a5",urlPh:"Supabase URL",keyPh:"Anon Key",connectBtn:"\u8fde\u63a5",connectErr:"\u8fde\u63a5\u5931\u8d25",noData:"\u8fd8\u6ca1\u6709\u6570\u636e"}
};

var sb=null;
function initSB(u,k){sb=supabase.createClient(u,k)}
async function fetchAll(t,o,a){if(!sb)return[];try{var q=sb.from(t).select("*");if(o)q=q.order(o,{ascending:a!==false});var r=await q;return r.error?[]:r.data||[]}catch(e){return[]}}
async function insertRow(t,r){if(!sb)return null;try{var res=await sb.from(t).insert(r).select();return res.error?null:(res.data||[])[0]||null}catch(e){return null}}
async function updateRow(t,id,u){if(!sb)return null;try{var res=await sb.from(t).update(u).eq("id",id).select();return res.error?null:(res.data||[])[0]||null}catch(e){return null}}
async function deleteRow(t,id){if(!sb)return false;try{var res=await sb.from(t).delete().eq("id",id);return!res.error}catch(e){return false}}
async function upsertRow(t,r,c){if(!sb)return null;try{var res=await sb.from(t).upsert(r,c?{onConflict:c}:{}).select();return res.error?null:(res.data||[])[0]||null}catch(e){return null}}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){return d?d.slice(5).replace("-","/"):""}

function getHash(){try{var h=decodeURIComponent(window.location.hash.slice(1));if(!h)return null;return JSON.parse(h)}catch(e){return null}}
function setHash(o){window.location.hash=encodeURIComponent(JSON.stringify(o))}

var TAG_C={"\u63a8\u8fdb":CL.light,"\u89c2\u5bdf":CL.gold,"\u60f3\u6cd5":CL.pale,push:CL.light,observe:CL.gold,idea:CL.pale};
var PRI_C={high:CL.dark,medium:CL.gold,low:CL.pale};
var STAT_C={on_track:CL.light,at_risk:CL.gold,blocked:"#c45555"};

// ===== CONNECT SCREEN =====
function ConnectScreen({onConnect,t}){
  var [url,setUrl]=useState("");
  var [key,setKey]=useState("");
  var [err,setErr]=useState("");
  var [loading,setLoading]=useState(false);
  async function go(){
    if(!url||!key)return;
    setLoading(true);setErr("");
    try{
      var u=url.trim().replace(/\/+$/,"");
      initSB(u,key.trim());
      var test=await sb.from("work_status").select("id").limit(1);
      if(test.error)throw new Error(test.error.message);
      setHash({url:u,key:key.trim()});
      onConnect();
    }catch(e){setErr(t.connectErr);sb=null}
    setLoading(false);
  }
  return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{...S.card,padding:32,width:380,textAlign:"center"}}>
      <div style={{fontSize:20,color:CL.dark,letterSpacing:3,marginBottom:24}}>RACK <span style={{color:CL.gold}}>#</span></div>
      <input value={url} onChange={function(e){setUrl(e.target.value)}} placeholder={t.urlPh} style={{...S.input,marginBottom:10,fontSize:13}}/>
      <input value={key} onChange={function(e){setKey(e.target.value)}} placeholder={t.keyPh} type="password" style={{...S.input,marginBottom:14,fontSize:13}}/>
      {err&&<div style={{color:"#c45555",fontSize:12,marginBottom:8}}>{err}</div>}
      <span onClick={go} style={{...S.btnDk,width:"100%",display:"block",textAlign:"center",padding:"10px 0"}}>{loading?t.loading:t.connectBtn}</span>
    </div>
  </div>);
}

// ===== SHARED =====
function SysTabs({system,setSystem,setPage}){
  return (<div className="sys-tabs">
    {[["work","WORK"],["lux","LUX"],["iris","IRIS"]].map(function(arr){return(
      <div key={arr[0]} className="sys-tab" onClick={function(){setSystem(arr[0]);setPage("overview")}} style={{background:system===arr[0]?CL.primary:CL.card,color:system===arr[0]?CL.wash:CL.pale}}>{arr[1]}</div>
    )})}
  </div>);
}
function Nav({page,setPage,lang,setLang,t,system}){
  var tabMap={work:[["overview",t.overview],["tasks",t.tasks],["metrics",t.metrics],["context",t.context]],lux:[["overview",t.overview],["tasks",t.tasks],["ideas",t.ideas]],iris:[["overview",t.overview],["tasks",t.tasks],["learn",t.learn]]};
  return (<div style={{...S.card,padding:"12px 20px",display:"flex",alignItems:"center",gap:14,marginBottom:20,flexWrap:"wrap"}}>
    <span style={{fontSize:16,color:CL.dark,marginRight:8}}>RACK <span style={{color:CL.gold}}>#</span></span>
    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{(tabMap[system]||[]).map(function(arr){return <span key={arr[0]} style={page===arr[0]?S.btnDk:S.btn} onClick={function(){setPage(arr[0])}}>{arr[1]}</span>})}</div>
    <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
      <div style={{display:"flex",border:"2px solid "+CL.primary}}>{["en","zh"].map(function(l){return <span key={l} onClick={function(){setLang(l)}} style={{fontSize:11,padding:"3px 10px",background:lang===l?CL.primary:CL.card,color:lang===l?CL.wash:CL.primary,cursor:"pointer"}}>{l.toUpperCase()}</span>})}</div>
      <div style={{width:12,height:12,background:CL.faint,animation:"pulse 2.5s ease-in-out infinite"}}/>
    </div>
  </div>);
}
function TaskRow({tk,lineName,t,isDone,onCycle}){
  return (<div style={{display:"flex",alignItems:"center",padding:isDone?"6px 18px":"10px 18px",borderBottom:"1px dashed "+CL.faint}}>
    <div style={{width:28,flexShrink:0}} onClick={function(e){e.stopPropagation();if(onCycle)onCycle(tk.id,tk.status)}}>
      <span style={{width:14,height:14,display:"inline-block",cursor:"pointer",border:"2px solid "+(isDone?CL.gold:tk.status==="in_progress"?CL.primary:CL.border),background:isDone?CL.gold:tk.status==="in_progress"?CL.primary:"transparent"}}/>
    </div>
    <div style={{width:28,flexShrink:0}}>{!isDone&&<span style={{fontSize:11,color:PRI_C[tk.priority]}}>{tk.priority==="high"?t.high:tk.priority==="medium"?t.med:t.low}</span>}</div>
    <div style={{flex:1,minWidth:0,fontSize:isDone?13:14,color:isDone?CL.muted:CL.text,textDecoration:isDone?"line-through":"none"}}>{tk.title}</div>
    {lineName&&<span style={{fontSize:12,color:CL.pale,marginLeft:12,flexShrink:0}}>{lineName}</span>}
    {tk.due_date&&!isDone&&<span style={{fontSize:12,color:CL.muted,marginLeft:12,flexShrink:0}}>{fmtDate(tk.due_date)}</span>}
    {isDone&&tk.completed_at&&<span style={{fontSize:11,color:CL.pale,marginLeft:12,flexShrink:0}}>{fmtDate(tk.completed_at)}</span>}
  </div>);
}
function TasksList({tasks,lines,t,onCycle}){
  var [filter,setFilter]=useState("all");
  var fl=filter==="all"?tasks:tasks.filter(function(x){return x.work_line_id===filter});
  var pending=fl.filter(function(x){return x.status!=="done"&&!x.is_archived}).sort(function(a,b){var p={high:0,medium:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1)});
  var done=fl.filter(function(x){return x.status==="done"&&!x.is_archived}).sort(function(a,b){return new Date(b.completed_at||0)-new Date(a.completed_at||0)});
  var ln=function(id){var f=lines.find(function(l){return l.id===id});return f?f.name:""};
  return (<div>
    <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
      <span style={filter==="all"?S.btnDk:S.btn} onClick={function(){setFilter("all")}}>ALL</span>
      {lines.map(function(w){return <span key={w.id} style={filter===w.id?S.btnDk:S.btn} onClick={function(){setFilter(w.id)}}>{w.name}</span>})}
    </div>
    <div style={S.card}>
      {pending.length===0&&done.length===0&&<div style={{padding:28,textAlign:"center",color:CL.pale}}>{t.noTasks}</div>}
      {pending.map(function(tk){return <TaskRow key={tk.id} tk={tk} lineName={ln(tk.work_line_id)} t={t} isDone={false} onCycle={onCycle}/>})}
      {done.length>0&&<div style={{padding:"12px 18px 4px"}}><span style={{fontSize:11,letterSpacing:2,color:CL.pale}}>{t.done}</span></div>}
      {done.map(function(tk){return <TaskRow key={tk.id} tk={tk} lineName={ln(tk.work_line_id)} t={t} isDone={true} onCycle={onCycle}/>})}
    </div>
  </div>);
}

// ===== WORK PAGES =====
function WorkOverview({lines,tasks,t,onCycle}){
  var active=tasks.filter(function(x){return x.status!=="done"&&!x.is_archived});
  var ln=function(id){var f=lines.find(function(l){return l.id===id});return f?f.name:""};
  return (<div>
    <div style={{...S.card,padding:"14px 24px",display:"flex",gap:32,marginBottom:20}}>
      <div><span style={S.label}>{t.pending} </span><span style={{fontSize:20,color:CL.primary,marginLeft:6}}>{active.length}</span></div>
      <div><span style={S.label}>IN PROGRESS </span><span style={{fontSize:20,color:CL.primary,marginLeft:6}}>{active.filter(function(x){return x.status==="in_progress"}).length}</span></div>
      <div><span style={S.label}>{t.high} </span><span style={{fontSize:20,color:CL.dark,marginLeft:6}}>{active.filter(function(x){return x.priority==="high"}).length}</span></div>
    </div>
    <div style={{display:"flex",gap:16,marginBottom:24}}>
      {lines.map(function(wl){return(<div key={wl.id} style={{...S.card,padding:"18px 20px",flex:"1 1 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:15}}>{wl.name}</span><span style={{fontSize:11,color:STAT_C[wl.status]||CL.light,border:"1px solid",padding:"1px 8px"}}>{t[wl.status==="on_track"?"onTrack":wl.status==="at_risk"?"atRisk":"blocked"]||wl.status}</span></div>
        {wl.key_metric_value!=null&&<div style={{fontSize:28,color:CL.primary}}>{wl.key_metric_value}<span style={{fontSize:13,color:CL.muted,marginLeft:6}}>{wl.key_metric_unit||""}</span></div>}
        {wl.key_metric_label&&<div style={{fontSize:12,color:CL.muted,marginBottom:10}}>{wl.key_metric_label}</div>}
        {wl.next_action&&<div style={{fontSize:13,borderTop:"2px dashed "+CL.faint,paddingTop:10}}>{"\u2192"} {wl.next_action}</div>}
      </div>)})}
    </div>
    <div style={S.secTitle}>{t.recentTasks}</div>
    <div style={S.card}>{active.slice(0,5).map(function(tk){return <TaskRow key={tk.id} tk={tk} lineName={ln(tk.work_line_id)} t={t} isDone={false} onCycle={onCycle}/>})}</div>
  </div>);
}
function WorkMetrics({metrics,t}){
  var sorted=[].concat(metrics).sort(function(a,b){return a.date.localeCompare(b.date)});
  var l7=sorted.slice(-7),p7=sorted.slice(-14,-7);var sm=function(a,k){return a.reduce(function(s,m){return s+(m[k]||0)},0)};
  var cmp=function(k){var c=sm(l7,k),p=sm(p7,k);if(!p)return{v:c,d:"flat",p:null};var pct=Math.round((c-p)/p*100);return{v:c,d:pct>0?"up":pct<0?"down":"flat",p:Math.abs(pct)}};
  var recent=sorted.slice(-14);var maxV=Math.max.apply(null,recent.map(function(d){return Math.max(d.new_guanchayuan||0,d.new_chapin||0)}));if(maxV<10)maxV=10;
  if(recent.length===0)return <div style={{...S.card,padding:28,textAlign:"center",color:CL.pale}}>{t.noData}</div>;
  return (<div>
    <div style={{...S.card,padding:20,marginBottom:20}}><div style={S.secTitle}>14 DAYS</div>
      <div style={{height:140,display:"flex",alignItems:"flex-end",gap:4}}>{recent.map(function(d,i){return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
        <div style={{display:"flex",gap:2,alignItems:"flex-end",height:120,width:"100%"}}><div style={{flex:1,height:Math.max(3,(d.new_guanchayuan||0)/maxV*120),background:CL.primary}}/><div style={{flex:1,height:Math.max(3,(d.new_chapin||0)/maxV*120),background:CL.gold}}/></div>
        <span style={{fontSize:9,color:CL.pale}}>{d.date.slice(8)}</span></div>)})}</div>
      <div style={{display:"flex",gap:20,marginTop:12,fontSize:12}}><span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,background:CL.primary}}/>{t.observers}</span><span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,background:CL.gold}}/>{t.reviews}</span></div></div>
    <div style={{...S.card,padding:20,display:"flex",gap:40,flexWrap:"wrap"}}>{[["new_guanchayuan",t.observers],["new_chapin",t.reviews],["new_negative",t.negative]].map(function(arr){var c=cmp(arr[0]);return(<div key={arr[0]} style={{textAlign:"center"}}><div style={{...S.label,marginBottom:4}}>{arr[1]}</div><div style={{fontSize:26,color:CL.primary}}>{c.v}</div>{c.p!=null&&<span style={{fontSize:13,color:c.d==="up"?CL.light:CL.gold}}>{c.d==="up"?"\u2191":"\u2193"}{c.p}%</span>}</div>)})}</div>
  </div>);
}
function WorkContext({contextItems,decisions,t}){
  return (<div>
    <div style={{...S.card,padding:20,marginBottom:20}}><div style={S.secTitle}>{t.progress}</div>
      {contextItems.map(function(c){return(<div key={c.id} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:"1px dashed "+CL.faint}}>
        <span style={{fontSize:12,color:CL.pale,width:44,flexShrink:0}}>{fmtDate(c.created_at)}</span>
        <span style={{fontSize:11,color:(TAG_C[c.type]||TAG_C[c.tag]||CL.pale),border:"1px solid "+(TAG_C[c.type]||TAG_C[c.tag]||CL.pale)+"60",padding:"1px 7px",flexShrink:0}}>{c.type||c.tag||""}</span>
        <span style={{fontSize:14,color:CL.text,flex:1,lineHeight:1.5}}>{c.content}</span></div>)})}
      {contextItems.length===0&&<div style={{padding:16,textAlign:"center",color:CL.pale}}>{"\u2014"}</div>}
    </div>
    <div style={{...S.card,padding:20}}><div style={S.secTitle}>{t.decisions}</div>
      {decisions.map(function(d){return(<div key={d.id} style={{padding:"10px 0 10px 14px",borderLeft:"3px solid "+CL.faint,marginBottom:10}}>
        <div style={{fontSize:14}}>{d.decision}</div>{d.reasoning&&<div style={{fontSize:13,color:CL.muted,marginTop:4}}>{d.reasoning}</div>}
        <div style={{fontSize:12,color:CL.pale,marginTop:4}}>{d.made_by||""} {"\u00b7"} {fmtDate(d.made_at)}</div></div>)})}
      {decisions.length===0&&<div style={{padding:16,textAlign:"center",color:CL.pale}}>{"\u2014"}</div>}
    </div>
  </div>);
}

// ===== LUX PAGES =====
function LuxOverview({lines,t}){
  var act=lines.filter(function(l){return l.status!=="done"});var dn=lines.filter(function(l){return l.status==="done"});
  return (<div>
    <div style={S.secTitle}>{t.projects} ({act.length})</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
      {act.map(function(p){return(<div key={p.id} style={{...S.card,padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>{p.icon&&<span style={{fontSize:24}}>{p.icon}</span>}<div><div style={{fontSize:14}}>{p.name}</div>{p.description&&<div style={{fontSize:11,color:CL.pale}}>{p.description}</div>}</div></div>
        {p.next_action&&<div style={{fontSize:13,marginBottom:8}}>{p.next_action}</div>}
      </div>)})}
    </div>
    {dn.length>0&&<div><div style={S.secTitle}>{t.completed} ({dn.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {dn.map(function(p){return(<div key={p.id} style={{...S.cardDim,padding:"16px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>{p.icon&&<span style={{fontSize:24,opacity:0.4}}>{p.icon}</span>}<div><div style={{fontSize:14,color:CL.muted}}>{p.name}</div></div></div>
        </div>)})}
      </div></div>}
  </div>);
}
function LuxIdeas({ideas,linesAll,t,onAdopt,onDrop}){
  var [showDone,setShowDone]=useState(false);
  var actv=ideas.filter(function(x){return x.status==="active"});var proc=ideas.filter(function(x){return x.status!=="active"});
  return (<div>
    <div style={S.card}>
      {actv.map(function(idea){return(<div key={idea.id} style={{display:"flex",alignItems:"flex-start",padding:"12px 18px",borderBottom:"1px dashed "+CL.faint,gap:12}}>
        <div style={{flex:1}}><div style={{fontSize:14,lineHeight:1.6}}>{idea.content}</div>
          <div style={{display:"flex",gap:10,marginTop:6,alignItems:"center"}}><span style={{fontSize:12,color:CL.pale}}>{fmtDate(idea.created_at)}</span>
            {idea.line_id&&<span style={{fontSize:11,color:CL.light,border:"1px solid "+CL.faint,padding:"0 6px"}}>{(linesAll.find(function(l){return l.id===idea.line_id})||{}).name||""}</span>}</div></div>
        <div style={{display:"flex",gap:4,flexShrink:0,paddingTop:2}}>
          <span onClick={function(){onAdopt(idea.id)}} style={{...S.btnSm,fontSize:11,padding:"2px 8px",color:CL.light,borderColor:CL.faint,cursor:"pointer"}} title={t.adopt}>{"\u2713"}</span>
          <span onClick={function(){onDrop(idea.id)}} style={{...S.btnSm,fontSize:11,padding:"2px 8px",color:CL.muted,borderColor:CL.faint,cursor:"pointer"}} title={t.drop}>{"\u00d7"}</span>
        </div>
      </div>)})}
      {actv.length===0&&<div style={{padding:28,textAlign:"center",color:CL.pale}}>{t.noIdeas}</div>}
    </div>
    {proc.length>0&&<div style={{marginTop:16}}>
      <span onClick={function(){setShowDone(!showDone)}} style={{fontSize:12,color:CL.pale,cursor:"pointer",letterSpacing:1}}>{showDone?"\u25b2":"\u25b8"} {t.processed} ({proc.length})</span>
      {showDone&&<div style={{...S.cardDim,marginTop:8}}>
        {proc.map(function(idea){return(<div key={idea.id} style={{display:"flex",padding:"8px 18px",borderBottom:"1px dashed #e8e8e8",gap:12,alignItems:"center"}}>
          <span style={{fontSize:11,color:idea.status==="adopted"?CL.gold:CL.border,width:32,flexShrink:0}}>{idea.status==="adopted"?t.adopt:t.drop}</span>
          <span style={{fontSize:13,color:CL.muted,flex:1}}>{idea.content}</span>
          <span style={{fontSize:11,color:CL.border}}>{fmtDate(idea.created_at)}</span></div>)})}
      </div>}</div>}
  </div>);
}

// ===== IRIS PAGES =====
function IrisOverview({lines,learnings,t}){
  return (<div>
    <div style={{display:"flex",gap:16,marginBottom:24,flexWrap:"wrap"}}>
      {lines.map(function(wl){return(<div key={wl.id} style={{...S.card,padding:"18px 20px",flex:"1 1 280px"}}>
        <div style={{fontSize:15,marginBottom:12}}>{wl.name}</div>
        {wl.direction&&<div style={{marginBottom:8}}><div style={{fontSize:11,letterSpacing:1,color:CL.gold,marginBottom:3}}>{t.direction}</div><div style={{fontSize:13}}>{wl.direction}</div></div>}
        {wl.next_action&&<div style={{borderTop:"2px dashed "+CL.faint,paddingTop:8}}><div style={{fontSize:11,letterSpacing:1,color:CL.pale,marginBottom:3}}>{t.nextStep}</div><div style={{fontSize:13}}>{"\u2192"} {wl.next_action}</div></div>}
      </div>)})}
    </div>
    <div style={S.secTitle}>{t.recentLearn}</div>
    <div style={S.card}>{learnings.slice(0,3).map(function(l){return(<div key={l.id} style={{padding:"12px 18px",borderBottom:"1px dashed "+CL.faint}}>
      <div style={{fontSize:14,lineHeight:1.6}}>{l.content}</div>
      <div style={{display:"flex",gap:10,marginTop:6,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:12,color:CL.pale}}>{fmtDate(l.created_at)}</span>
        {l.source&&<span style={{fontSize:12,color:CL.muted}}>{"\u00b7"} {l.source}</span>}
        {l.tags&&l.tags.map(function(tg){return <span key={tg} style={{fontSize:11,color:CL.light,border:"1px solid "+CL.faint,padding:"0 6px"}}>{tg}</span>})}</div></div>)})}{learnings.length===0&&<div style={{padding:28,textAlign:"center",color:CL.pale}}>{t.noLearn}</div>}</div>
  </div>);
}
function LearnPage({learnings,t}){
  var last="";
  return (<div>{learnings.map(function(l){var show=l.created_at!==last;last=l.created_at;return(<div key={l.id}>
    {show&&<div style={{fontSize:12,color:CL.muted,padding:"14px 0 4px",display:"flex",alignItems:"center",gap:8}}><span style={{width:6,height:6,background:CL.gold}}/>{(l.created_at||"").slice(0,10)}</div>}
    <div style={{padding:"10px 0 10px 18px",borderLeft:"2px solid "+CL.faint}}>
      <div style={{fontSize:14,lineHeight:1.7}}>{l.content}</div>
      <div style={{display:"flex",gap:10,marginTop:6,alignItems:"center",flexWrap:"wrap"}}>
        {l.source&&<span style={{fontSize:12,color:CL.muted}}>{l.source}</span>}
        {l.tags&&l.tags.map(function(tg){return <span key={tg} style={{fontSize:11,color:CL.light,border:"1px solid "+CL.faint,padding:"0 6px"}}>{tg}</span>})}</div></div></div>)})}{learnings.length===0&&<div style={{padding:28,textAlign:"center",color:CL.pale}}>{t.noLearn}</div>}</div>);
}

// ===== QUICK ADD =====
function QuickAdd({system,t,lines,refresh}){
  var [open,setOpen]=useState(false);var [more,setMore]=useState(false);
  var [tv,setTv]=useState("");var [twl,setTwl]=useState("");
  var [mf,setMf]=useState({a:"",b:"",c:"",neg:"",active:"",conv:"",notes:""});
  var [lc,setLc]=useState("");var [ls,setLs]=useState("");
  var [ic,setIc]=useState("");var [il,setIl]=useState("");
  async function addTask(){if(!tv.trim())return;await insertRow("tasks",{title:tv.trim(),work_line_id:twl||null,category:system==="work"?"work":system==="lux"?"lux":"self",status:"todo",priority:"medium"});setTv("");setTwl("");refresh()}
  async function saveMetrics(){var r={date:today(),new_guanchayuan:parseInt(mf.a)||0,new_chapin:parseInt(mf.b)||0,curated_chapin:parseInt(mf.c)||0};if(more){r.new_negative=parseInt(mf.neg)||0;r.active_guanchayuan=parseInt(mf.active)||0;r.conversion_rate=parseFloat(mf.conv)||null;r.notes=mf.notes||null}await upsertRow("daily_metrics",r,"date");setMf({a:"",b:"",c:"",neg:"",active:"",conv:"",notes:""});refresh()}
  async function addLearn(){if(!lc.trim())return;await insertRow("learnings",{content:lc.trim(),source:ls.trim()||null,category:"self"});setLc("");setLs("");refresh()}
  async function addIdea(){if(!ic.trim())return;await insertRow("ideas",{content:ic.trim(),line_id:il||null,category:"lux"});setIc("");setIl("");refresh()}
  if(!open)return(<div onClick={function(){setOpen(true)}} style={{position:"fixed",bottom:0,left:0,right:0,background:CL.primary,color:CL.wash,padding:"14px 24px",fontSize:13,cursor:"pointer",textAlign:"center",letterSpacing:3,boxShadow:"0 -2px 0 "+CL.dark,zIndex:50}}>+ QUICK ADD</div>);
  return(<div style={{position:"fixed",bottom:0,left:0,right:0,background:CL.card,border:"2px solid "+CL.primary,borderBottom:"none",padding:"18px 28px",boxShadow:"0 -4px 12px rgba(26,45,92,.1)",zIndex:50}}>
    <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:20,alignItems:"flex-end",flexWrap:"wrap"}}>
      {system==="work"&&<React.Fragment>
        <div style={{flex:1,minWidth:240}}>
          <div style={{...S.label,marginBottom:8}}>{t.metrics}</div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.observers}</div><input type="number" value={mf.a} onChange={function(e){setMf(Object.assign({},mf,{a:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.reviews}</div><input type="number" value={mf.b} onChange={function(e){setMf(Object.assign({},mf,{b:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.gold,marginBottom:3}}>{t.curated}</div><input type="number" value={mf.c} onChange={function(e){setMf(Object.assign({},mf,{c:e.target.value}))}} style={{...S.input,fontSize:13,color:CL.gold}}/></div>
            <span onClick={saveMetrics} style={{...S.btnDk,alignSelf:"flex-end"}}>{t.save}</span>
          </div>
          {more&&<div style={{display:"flex",gap:10,marginTop:10}}>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.negative}</div><input type="number" value={mf.neg} onChange={function(e){setMf(Object.assign({},mf,{neg:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.active}</div><input type="number" value={mf.active} onChange={function(e){setMf(Object.assign({},mf,{active:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.convRate}</div><input type="number" step="0.1" value={mf.conv} onChange={function(e){setMf(Object.assign({},mf,{conv:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
            <div style={{flex:2}}><div style={{fontSize:10,color:CL.muted,marginBottom:3}}>{t.notes}</div><input value={mf.notes} onChange={function(e){setMf(Object.assign({},mf,{notes:e.target.value}))}} style={{...S.input,fontSize:13}}/></div>
          </div>}
          <span style={{fontSize:11,color:CL.pale,cursor:"pointer",marginTop:6,display:"inline-block"}} onClick={function(){setMore(!more)}}>{more?t.less:t.more}</span>
        </div><div style={{width:1,height:44,background:CL.faint}}/>
      </React.Fragment>}
      {system==="iris"&&<React.Fragment>
        <div style={{flex:1,minWidth:240}}>
          <div style={{...S.label,marginBottom:8}}>{t.learn}</div>
          <div style={{display:"flex",gap:10}}>
            <input value={lc} onChange={function(e){setLc(e.target.value)}} placeholder="\u4eca\u5929\u7406\u89e3\u4e86\u4ec0\u4e48..." style={{...S.input,flex:2,fontSize:13}}/>
            <input value={ls} onChange={function(e){setLs(e.target.value)}} placeholder={t.source} style={{...S.input,flex:1,fontSize:12}}/>
            <span onClick={addLearn} style={S.btnDk}>{t.addLearn}</span>
          </div>
        </div><div style={{width:1,height:44,background:CL.faint}}/>
      </React.Fragment>}
      {system==="lux"&&<React.Fragment>
        <div style={{flex:1,minWidth:240}}>
          <div style={{...S.label,marginBottom:8}}>{t.ideaLabel||t.ideas}</div>
          <div style={{display:"flex",gap:10}}>
            <input value={ic} onChange={function(e){setIc(e.target.value)}} placeholder={t.ideaPh} style={{...S.input,flex:2,fontSize:13}}/>
            <select value={il} onChange={function(e){setIl(e.target.value)}} style={{...S.input,width:120,fontSize:12}}><option value="">{"\u9879\u76ee"}</option>{lines.filter(function(l){return l.status!=="done"}).map(function(l){return <option key={l.id} value={l.id}>{l.name}</option>})}</select>
            <span onClick={addIdea} style={S.btnDk}>{t.addIdea}</span>
          </div>
        </div><div style={{width:1,height:44,background:CL.faint}}/>
      </React.Fragment>}
      <div style={{flex:1,minWidth:240}}>
        <div style={{...S.label,marginBottom:8}}>{t.tasks}</div>
        <div style={{display:"flex",gap:10}}>
          <input placeholder={t.newTask} value={tv} onChange={function(e){setTv(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")addTask()}} style={{...S.input,flex:1,fontSize:13}}/>
          <select value={twl} onChange={function(e){setTwl(e.target.value)}} style={{...S.input,width:100,fontSize:12}}><option value="">{"\u2014"}</option>{lines.map(function(w){return <option key={w.id} value={w.id}>{w.name}</option>})}</select>
          <span onClick={addTask} style={S.btnDk}>+</span>
        </div>
      </div>
      <span style={{...S.btnSm,alignSelf:"flex-end"}} onClick={function(){setOpen(false)}}>{"\u00d7"}</span>
    </div>
  </div>);
}

// ===== APP =====
function App(){
  var [connected,setConnected]=useState(false);
  var [system,setSystem]=useState("work");
  var [page,setPage]=useState("overview");
  var [lang,setLang]=useState("zh");
  var [loading,setLoading]=useState(true);
  var [lines,setLines]=useState([]);
  var [tasks,setTasks]=useState([]);
  var [metrics,setMetrics]=useState([]);
  var [contextItems,setContextItems]=useState([]);
  var [decisions,setDecisions]=useState([]);
  var [learnings,setLearnings]=useState([]);
  var [ideas,setIdeas]=useState([]);
  var t=TX[lang];

  var refresh=useCallback(async function(){
    var [ln,tk,mt,ci,dc,lr,id]=await Promise.all([
      fetchAll("lines","order_index",true),
      fetchAll("tasks","created_at",false),
      fetchAll("daily_metrics","date",true),
      fetchAll("context_items","created_at",false),
      fetchAll("decisions","made_at",false),
      fetchAll("learnings","created_at",false),
      fetchAll("ideas","created_at",false)
    ]);
    setLines(ln);setTasks(tk);setMetrics(mt);setContextItems(ci);setDecisions(dc);setLearnings(lr);setIdeas(id);setLoading(false);
  },[]);

  useEffect(function(){
    var h=getHash();
    if(h&&h.url&&h.key){initSB(h.url,h.key);setConnected(true);refresh()}
    else{setLoading(false)}
  },[]);

  async function cycleTask(id,cur){
    var next=cur==="todo"?"in_progress":cur==="in_progress"?"done":"todo";
    var upd={status:next};
    if(next==="done")upd.completed_at=new Date().toISOString();
    else upd.completed_at=null;
    await updateRow("tasks",id,upd);refresh();
  }
  async function adoptIdea(id){await updateRow("ideas",id,{status:"adopted"});refresh()}
  async function dropIdea(id){await updateRow("ideas",id,{status:"dropped"});refresh()}

  var curLines=lines.filter(function(l){return system==="work"?l.category==="work":system==="lux"?l.category==="lux":l.category==="self"});
  var curTasks=tasks.filter(function(t2){return system==="work"?t2.category==="work":system==="lux"?t2.category==="lux":t2.category==="self"});
  var curCtx=contextItems.filter(function(c){return c.category==="work"||!c.category});
  var curDec=decisions.filter(function(d){return d.category==="work"||!d.category});

  if(!connected&&!loading)return <ConnectScreen onConnect={function(){setConnected(true);refresh()}} t={t}/>;
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:CL.pale,letterSpacing:3}}>{t.loading}</span></div>;

  return (<div>
    <SysTabs system={system} setSystem={setSystem} setPage={setPage}/>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 32px 90px",marginLeft:90}}>
      <Nav page={page} setPage={setPage} lang={lang} setLang={setLang} t={t} system={system}/>
      {system==="work"&&<React.Fragment>
        {page==="overview"&&<WorkOverview lines={curLines} tasks={curTasks} t={t} onCycle={cycleTask}/>}
        {page==="tasks"&&<TasksList tasks={curTasks} lines={curLines} t={t} onCycle={cycleTask}/>}
        {page==="metrics"&&<WorkMetrics metrics={metrics} t={t}/>}
        {page==="context"&&<WorkContext contextItems={curCtx} decisions={curDec} t={t}/>}
      </React.Fragment>}
      {system==="lux"&&<React.Fragment>
        {page==="overview"&&<LuxOverview lines={curLines} t={t}/>}
        {page==="tasks"&&<TasksList tasks={curTasks} lines={curLines} t={t} onCycle={cycleTask}/>}
        {page==="ideas"&&<LuxIdeas ideas={ideas} linesAll={curLines} t={t} onAdopt={adoptIdea} onDrop={dropIdea}/>}
      </React.Fragment>}
      {system==="iris"&&<React.Fragment>
        {page==="overview"&&<IrisOverview lines={curLines} learnings={learnings} t={t}/>}
        {page==="tasks"&&<TasksList tasks={curTasks} lines={curLines} t={t} onCycle={cycleTask}/>}
        {page==="learn"&&<LearnPage learnings={learnings} t={t}/>}
      </React.Fragment>}
      <div style={{textAlign:"center",padding:"24px 0"}}><span style={{fontSize:11,letterSpacing:3,color:CL.muted}}>{t.footer}</span></div>
    </div>
    <QuickAdd system={system} t={t} lines={curLines} refresh={refresh}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
