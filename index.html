var sb=null;var baseUrl="";

async function uploadIcon(file){return new Promise(function(resolve){var canvas=document.createElement("canvas");var img=new Image();img.onload=function(){var s=Math.min(200/img.width,200/img.height,1);canvas.width=img.width*s;canvas.height=img.height*s;var ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,canvas.width,canvas.height);var b64=canvas.toDataURL("image/jpeg",0.8);fetch(baseUrl+"/functions/v1/rack/upload-icon",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image_base64:b64,filename:"icon-"+Date.now()})}).then(function(r){return r.json()}).then(function(d){resolve(d.url||null)}).catch(function(){resolve(null)})};img.src=URL.createObjectURL(file)})}
function ConnectScreen({onConnect,t}){var [url,su]=useState("");var [key,sk]=useState("");var [err,se]=useState("");var [ld,sl]=useState(false);async function go(){if(!url||!key)return;sl(true);se("");try{initSB(url.trim().replace(/\/+$/,""),key.trim());var r=await sb.from("lines").select("id").limit(1);if(r.error)throw 0;setH({url:url.trim().replace(/\/+$/,""),key:key.trim()});onConnect()}catch(e){se(t.ce);sb=null}sl(false)}return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{...S.card,padding:36,width:400,textAlign:"center"}}><div style={{fontSize:22,color:C.dk,letterSpacing:3,marginBottom:24}}>RACK <span style={{color:C.gd}}>#</span></div><input value={url} onChange={function(e){su(e.target.value)}} placeholder={t.u1} style={{...S.input,marginBottom:10}}/><input value={key} onChange={function(e){sk(e.target.value)}} placeholder={t.u2} type="password" onKeyDown={function(e){if(e.key==="Enter")go()}} style={{...S.input,marginBottom:14}}/>{err&&<div style={{color:C.dn,fontSize:13,marginBottom:8}}>{err}</div>}<span onClick={go} style={{...S.btnDk,width:"100%",display:"block",textAlign:"center",padding:"10px 0",fontSize:15}}>{ld?t.ld:t.cb}</span></div></div>}
function SysTabs({sys,setSys,setPg}){return <div className="sys-tabs">{[["work","WORK"],["lux","LUX"],["iris","IRIS"]].map(function(a){return <div key={a[0]} className="sys-tab" onClick={function(){setSys(a[0]);setPg("ov")}} style={{background:sys===a[0]?C.p:C.cd,color:sys===a[0]?C.ws:C.pl}}>{a[1]}</div>})}</div>}
function Nav({pg,setPg,lang,setLang,t,sys,onAddLine}){var tm={work:[["ov",t.ov],["tk",t.tk],["mt",t.mt],["cx",t.cx]],lux:[["ov",t.ov],["tk",t.tk],["id",t.id]],iris:[["ov",t.ov],["tk",t.tk],["ln",t.ln]]};return <div style={{...S.card,padding:"12px 20px",display:"flex",alignItems:"center",gap:14,marginBottom:20,flexWrap:"wrap"}}><span style={{fontSize:18,color:C.dk,marginRight:8}}>RACK <span style={{color:C.gd}}>#</span></span><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{(tm[sys]||[]).map(function(a){return <span key={a[0]} style={pg===a[0]?S.btnDk:S.btn} onClick={function(){setPg(a[0])}}>{a[1]}</span>})}</div><div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}><span onClick={onAddLine} style={{...S.btnSm,color:C.pl,borderColor:C.fn,fontSize:12,cursor:"pointer"}}>{t.addL}</span><div style={{display:"flex",border:"2px solid "+C.p}}>{["en","zh"].map(function(l){return <span key={l} onClick={function(){setLang(l)}} style={{fontSize:12,padding:"4px 10px",background:lang===l?C.p:C.cd,color:lang===l?C.ws:C.p,cursor:"pointer"}}>{l.toUpperCase()}</span>})}</div><div style={{width:12,height:12,background:C.fn,animation:"pulse 2.5s ease-in-out infinite"}}/></div></div>}
function LineEditCard({line,fields,onSave,onCancel,showIcon}){var [v,sV]=useState(function(){var o={};fields.forEach(function(f){o[f.key]=line[f.key]||""});return o});var [uploading,sU]=useState(false);var set=function(k,val){sV(function(p){var n=Object.assign({},p);n[k]=val;return n})};var handleFile=async function(e){var f=e.target.files[0];if(!f)return;sU(true);var url=await uploadIcon(f);if(url)set("icon_url",url);sU(false)};return <div style={{...S.card,padding:"14px 18px"}}>{fields.map(function(f){return <div key={f.key} style={{marginBottom:8}}><div style={{fontSize:12,color:C.mu,letterSpacing:1,marginBottom:2}}>{f.label}</div>{f.type==="select"?<select value={v[f.key]} onChange={function(e){set(f.key,e.target.value)}} style={{...S.input,fontSize:14}}>{f.options.map(function(o){return <option key={o[0]} value={o[0]}>{o[1]}</option>})}</select>:<input className="ei" value={v[f.key]} onChange={function(e){set(f.key,e.target.value)}}/>}</div>})}{showIcon&&<div style={{marginBottom:8}}><div style={{fontSize:12,color:C.mu,letterSpacing:1,marginBottom:2}}>ICON</div><div style={{display:"flex",gap:8,alignItems:"center"}}><input className="ei" value={v.icon||""} onChange={function(e){set("icon",e.target.value)}} placeholder="emoji" style={{width:60}}/><label style={{...S.btnSm,fontSize:11,cursor:"pointer"}}>{uploading?"...":"↑ IMG"}<input type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/></label>{v.icon_url&&<img src={v.icon_url} style={{width:28,height:28,objectFit:"cover",border:"1px solid "+C.fn}}/>}</div></div>}<div style={{display:"flex",gap:6,marginTop:4}}><span onClick={function(){onSave(line.id,v)}} style={{...S.btnSm,fontSize:12}}>OK</span><span onClick={onCancel} style={{...S.btnSm,fontSize:12,color:C.mu,borderColor:C.bd}}>CANCEL</span></div></div>}
function TaskRow({tk,lineName,t,isDone,onCycle,onEdit,onDel}){return <div className="hp" style={{display:"flex",alignItems:"center",padding:isDone?"8px 18px":"10px 18px",borderBottom:"1px dashed "+C.fn}}><div style={{width:30,flexShrink:0}} onClick={function(e){e.stopPropagation();if(onCycle)onCycle(tk.id,tk.status)}}><span style={{width:15,height:15,display:"inline-block",cursor:"pointer",border:"2px solid "+(isDone?C.gd:tk.status==="in_progress"?C.p:C.bd),background:isDone?C.gd:tk.status==="in_progress"?C.p:"transparent"}}/></div><div style={{width:36,flexShrink:0}}>{!isDone&&<span style={{fontSize:13,color:PC[tk.priority]}}>{tk.priority==="high"?t.hi:tk.priority==="medium"?t.md:t.lo}</span>}</div><div style={{flex:1,minWidth:0,fontSize:isDone?14:16,color:isDone?C.mu:C.tx,textDecoration:isDone?"line-through":"none",lineHeight:1.4}}>{tk.title}</div>{lineName&&<span style={{fontSize:13,color:C.pl,marginLeft:12,flexShrink:0}}>{lineName}</span>}{tk.due_date&&!isDone&&<span style={{fontSize:13,color:C.mu,marginLeft:12,flexShrink:0}}>{fd(tk.due_date)}</span>}{isDone&&tk.completed_at&&<span style={{fontSize:13,color:C.pl,marginLeft:12,flexShrink:0}}>{fd(tk.completed_at)}</span>}<div className="ha" style={{marginLeft:8}}>{onEdit&&<span onClick={function(e){e.stopPropagation();onEdit(tk.id)}} style={{fontSize:14,color:C.pl,cursor:"pointer"}}>✎</span>}{onDel&&<span onClick={function(e){e.stopPropagation();onDel(tk.id)}} style={{fontSize:14,color:C.pl,cursor:"pointer"}}>×</span>}</div></div>}
function TaskEditRow({tk,lines,t,onSave,onCancel}){var [title,sT]=useState(tk.title);var [pri,sP]=useState(tk.priority);var [wl,sW]=useState(tk.work_line_id||"");return <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 18px",borderBottom:"1px dashed "+C.fn,background:C.ws}}><input value={title} onChange={function(e){sT(e.target.value)}} style={{...S.input,flex:1,fontSize:14,padding:"6px 8px"}}/><select value={pri} onChange={function(e){sP(e.target.value)}} style={{...S.input,width:80,fontSize:13,padding:"6px 8px"}}><option value="high">{t.hi}</option><option value="medium">{t.md}</option><option value="low">{t.lo}</option></select><select value={wl} onChange={function(e){sW(e.target.value)}} style={{...S.input,width:100,fontSize:13,padding:"6px 8px"}}><option value="">—</option>{lines.map(function(l){return <option key={l.id} value={l.id}>{l.name}</option>})}</select><span onClick={function(){onSave(tk.id,{title:title,priority:pri,work_line_id:wl||null})}} style={{...S.btnSm,fontSize:12}}>OK</span><span onClick={onCancel} style={{...S.btnSm,fontSize:12,color:C.mu,borderColor:C.bd}}>×</span></div>}
function TasksList({tasks,lines,t,refresh}){var [filter,sF]=useState("all");var [editId,sE]=useState(null);var fl=filter==="all"?tasks:tasks.filter(function(x){return x.work_line_id===filter});var pend=fl.filter(function(x){return x.status!=="done"&&!x.is_archived}).sort(function(a,b){return({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1)});var done=fl.filter(function(x){return x.status==="done"&&!x.is_archived}).sort(function(a,b){return new Date(b.completed_at||0)-new Date(a.completed_at||0)});var ln=function(id){var f=lines.find(function(l){return l.id===id});return f?f.name:""};var cycle=async function(id,cur){var nx=cur==="todo"?"in_progress":cur==="in_progress"?"done":"todo";var u={status:nx};if(nx==="done")u.completed_at=new Date().toISOString();else u.completed_at=null;await upd("tasks",id,u);refresh()};var delT=async function(id){if(!confirm("Delete?"))return;await del("tasks",id);refresh()};var saveT=async function(id,v){await upd("tasks",id,v);sE(null);refresh()};function row(tk,isDone){if(editId===tk.id)return <TaskEditRow key={tk.id} tk={tk} lines={lines} t={t} onSave={saveT} onCancel={function(){sE(null)}}/>;return <TaskRow key={tk.id} tk={tk} lineName={ln(tk.work_line_id)} t={t} isDone={isDone} onCycle={cycle} onEdit={function(id){sE(id)}} onDel={delT}/>}return <div><div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}><span style={filter==="all"?S.btnDk:S.btn} onClick={function(){sF("all")}}>ALL</span>{lines.map(function(w){return <span key={w.id} style={filter===w.id?S.btnDk:S.btn} onClick={function(){sF(w.id)}}>{w.name}</span>})}</div><div style={S.card}>{!pend.length&&!done.length&&<div style={{padding:28,textAlign:"center",color:C.pl,fontSize:15}}>{t.nt}</div>}{pend.map(function(tk){return row(tk,false)})}{done.length>0&&<div style={{padding:"12px 18px 4px"}}><span style={{fontSize:13,letterSpacing:2,color:C.pl}}>{t.dn}</span></div>}{done.map(function(tk){return row(tk,true)})}</div></div>}
